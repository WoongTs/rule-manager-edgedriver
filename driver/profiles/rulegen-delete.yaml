name: rulegen-delete
components:
  - id: main
    label: AEB RuleGen
    capabilities:
      - id: refresh
        version: 1
      - id: healthCheck
        version: 1
      - id: earthpilot19519.rulegenRuleSelect
        version: 1
      - id: earthpilot19519.rulegenStatusCard
        version: 1
    categories:
      - name: RemoteController
  - id: status
    label: Status
    capabilities:
      - id: earthpilot19519.rulegenStatusPanel
        version: 1
preferences:
  - title: Bridge Address
    name: bridgeIp
    description: "AEB/EdgeBridge LAN address. Use IP:port, for example 192.168.x.xx:8088. Leave empty for mDNS auto-discovery."
    required: false
    preferenceType: string
    definition:
      stringType: text
      default: ""
  - title: Mode
    name: rulegenMode
    description: Create mode or delete mode.
    required: true
    preferenceType: enumeration
    definition:
      options:
        create: Create Rule
        delete: Delete Rule
      default: create
  - title: Template
    name: templateId
    description: Rule template.
    required: true
    preferenceType: enumeration
    definition:
      options:
        knob_switch_level_to_light_level: Knob Level to Target Level
        switch_pair_on_off_sync: Switch Pair Sync
      default: switch_pair_on_off_sync
  - title: Status Language
    name: statusLanguage
    description: Language for dashboard/status text generated by the driver.
    required: true
    preferenceType: enumeration
    definition:
      options:
        en: English
        ko: Korean
      default: ko
  - title: Enable Debug Log
    name: enableDebugLog
    required: true
    preferenceType: boolean
    definition:
      default: false
deviceConfig:
  dashboard:
    states:
      - component: main
        capability: earthpilot19519.rulegenStatusCard
        version: 1
        group: main
        values:
          - label: "{{statusText.value}}"
        composite: true
    actions:
      - component: main
        capability: refresh
        version: 1
        group: main
  detailView:
    - component: main
      capability: earthpilot19519.rulegenRuleSelect
      version: 1
    - component: status
      capability: earthpilot19519.rulegenStatusPanel
      version: 1
  automation:
    conditions: []
    actions: []
